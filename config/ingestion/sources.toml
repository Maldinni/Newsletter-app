

[[sources]]
name = "Jovem Pan - Política"
type = "listing"
url = "https://jovempan.com.br/noticias/politica"
allow_domains = ["jovempan.com.br"]
link_selector = "a[href]"
allow_url_patterns = [
  "^https://jovempan\\.com\\.br/noticias/politica/.+\\.html$"
]
deny_url_patterns = [
  "/tag/",
  "/autor/",
  "/programas/",
  "/videos/",
  "/podcasts/",
  "/esportes/",
  "/entretenimento/",
  "facebook.com",
  "instagram.com",
  "twitter.com",
  "youtube.com"
]

[sources.pagination]
mode = "query"
page_param = "page"
start = 1
end = 1000

