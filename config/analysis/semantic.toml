[definition]
max_article_number = 9
required_fields = ['Palavras-chave', 'Título', 'Descrição', 'Foco']

[distinction]
max_article_number = 9
required_fields = ['Características Distintivas']

[questions]
required_fields = ['Questões em Aberto']

[trends]
max_article_number = 9
older_cutoff = 2025
recent_cutoff = 2026
required_fields = [
                 'Narrativas Emergentes',
                 'Atores Emergentes',
                 'Narrativas em Declínio',
                 'Atores em Declínio'
                 ]

[dimensions]
max_article_number = 9
older_cutoff = 2025
recent_cutoff = 2026
required_fields = [
                'Dimensão 1 - Posicionamento Social e Político',
                'Dimensão 2 - Tom Emocional',
                'Dimensão 3 - Enquadramento do Problema',
                'Dimensão 4 - Centralidade de Atores Sociais',
                'Dimensão 5 - Foco em Instituições ou Indivíduos',
                'Dimensão 6 - Alcance Nacional ou Internacional',
                'Dimensão 7 - Evento Pontual ou Problema Estrutural',
                'Dimensão 8 - Uso de Evidências e Fontes',
                'Dimensão 9 - Tipo de Veículo de Mídia'
        ]

[trend_ranking]
recent_days = 7          # janela "recente"
baseline_days = 28       # janela-base anterior à recente (para aceleração)
min_cluster_size = 3     # descarta ruído/singletons do Leiden
top_k = 2                # quantos clusters em alta imprimir (2x/dia)
weight_acceleration = 0.35
weight_recent_volume = 0.30
weight_recency = 0.20
weight_size = 0.15

[llm]
temperature = 0.1
model_name = 'qwen2.5:7b'
delay = 0.5
retries = 5